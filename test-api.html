<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probador de API de Productos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            color: white;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-get { background: #4CAF50; }
        .btn-get-id { background: #2196F3; }
        .btn-post { background: #FF9800; }
        .btn-put { background: #9C27B0; }
        .btn-patch { background: #00BCD4; }
        .btn-delete { background: #F44336; }
        
        .form-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .response {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .response pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .product-card {
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        
        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .product-card h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .product-card .price {
            color: #4CAF50;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .product-card .category {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 18px;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ Probador de API de Productos</h1>
        <p class="subtitle">Prueba todos los endpoints de tu REST API</p>
        
        <div class="controls">
            <button class="btn-get" onclick="getAllProducts()">📋 GET Todos</button>
            <button class="btn-get-id" onclick="toggleForm('getById')">🔍 GET por ID</button>
            <button class="btn-post" onclick="toggleForm('create')">➕ POST Crear</button>
            <button class="btn-put" onclick="toggleForm('update')">✏️ PUT Actualizar</button>
            <button class="btn-patch" onclick="toggleForm('patch')">🔧 PATCH Parcial</button>
            <button class="btn-delete" onclick="toggleForm('delete')">🗑️ DELETE Eliminar</button>
        </div>

        <!-- Formulario GET por ID -->
        <div id="getById" class="form-section">
            <h3>Obtener Producto por ID</h3>
            <div class="form-group">
                <label>ID del Producto:</label>
                <input type="number" id="getByIdInput" placeholder="Ej: 1">
            </div>
            <button class="btn-get-id" onclick="getProductById()">Obtener Producto</button>
        </div>

        <!-- Formulario CREATE -->
        <div id="create" class="form-section">
            <h3>Crear Nuevo Producto</h3>
            <div class="form-group">
                <label>Título:</label>
                <input type="text" id="createTitle" placeholder="Nombre del producto">
            </div>
            <div class="form-group">
                <label>Precio:</label>
                <input type="number" step="0.01" id="createPrice" placeholder="99.99">
            </div>
            <div class="form-group">
                <label>Descripción:</label>
                <textarea id="createDescription" placeholder="Descripción del producto"></textarea>
            </div>
            <div class="form-group">
                <label>Categoría:</label>
                <input type="text" id="createCategory" placeholder="electronics, clothing, etc.">
            </div>
            <div class="form-group">
                <label>URL de Imagen (opcional):</label>
                <input type="text" id="createImage" placeholder="https://...">
            </div>
            <button class="btn-post" onclick="createProduct()">Crear Producto</button>
        </div>

        <!-- Formulario UPDATE (PUT) -->
        <div id="update" class="form-section">
            <h3>Actualizar Producto Completo (PUT)</h3>
            <div class="form-group">
                <label>ID del Producto:</label>
                <input type="number" id="updateId" placeholder="ID del producto a actualizar">
            </div>
            <div class="form-group">
                <label>Título:</label>
                <input type="text" id="updateTitle" placeholder="Nuevo título">
            </div>
            <div class="form-group">
                <label>Precio:</label>
                <input type="number" step="0.01" id="updatePrice" placeholder="99.99">
            </div>
            <div class="form-group">
                <label>Descripción:</label>
                <textarea id="updateDescription" placeholder="Nueva descripción"></textarea>
            </div>
            <div class="form-group">
                <label>Categoría:</label>
                <input type="text" id="updateCategory" placeholder="electronics, clothing, etc.">
            </div>
            <div class="form-group">
                <label>URL de Imagen:</label>
                <input type="text" id="updateImage" placeholder="https://...">
            </div>
            <button class="btn-put" onclick="updateProduct()">Actualizar Producto</button>
        </div>

        <!-- Formulario PATCH -->
        <div id="patch" class="form-section">
            <h3>Actualizar Parcialmente (PATCH)</h3>
            <div class="form-group">
                <label>ID del Producto:</label>
                <input type="number" id="patchId" placeholder="ID del producto">
            </div>
            <p style="color: #666; margin-bottom: 10px;">Solo completa los campos que deseas actualizar:</p>
            <div class="form-group">
                <label>Título (opcional):</label>
                <input type="text" id="patchTitle" placeholder="Dejar vacío si no se actualiza">
            </div>
            <div class="form-group">
                <label>Precio (opcional):</label>
                <input type="number" step="0.01" id="patchPrice" placeholder="Dejar vacío si no se actualiza">
            </div>
            <div class="form-group">
                <label>Descripción (opcional):</label>
                <textarea id="patchDescription" placeholder="Dejar vacío si no se actualiza"></textarea>
            </div>
            <div class="form-group">
                <label>Categoría (opcional):</label>
                <input type="text" id="patchCategory" placeholder="Dejar vacío si no se actualiza">
            </div>
            <button class="btn-patch" onclick="patchProduct()">Actualizar Parcialmente</button>
        </div>

        <!-- Formulario DELETE -->
        <div id="delete" class="form-section">
            <h3>Eliminar Producto</h3>
            <div class="form-group">
                <label>ID del Producto:</label>
                <input type="number" id="deleteId" placeholder="ID del producto a eliminar">
            </div>
            <button class="btn-delete" onclick="deleteProduct()">Eliminar Producto</button>
        </div>

        <div id="productsDisplay"></div>
        <div id="response" class="response" style="display: none;"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/products';

        function toggleForm(formId) {
            const forms = document.querySelectorAll('.form-section');
            forms.forEach(form => form.classList.remove('active'));
            
            const targetForm = document.getElementById(formId);
            if (targetForm) {
                targetForm.classList.add('active');
            }
            
            document.getElementById('productsDisplay').innerHTML = '';
        }

        function showResponse(data, isError = false) {
            const responseDiv = document.getElementById('response');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            responseDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function showLoading() {
            document.getElementById('productsDisplay').innerHTML = '<div class="loading">⏳ Cargando...</div>';
        }

        async function getAllProducts() {
            showLoading();
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.success) {
                    displayProducts(data.data);
                    showResponse(data);
                } else {
                    document.getElementById('productsDisplay').innerHTML = `<div class="error">${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('productsDisplay').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function displayProducts(products) {
            const display = document.getElementById('productsDisplay');
            display.innerHTML = `
                <h2 style="margin-top: 30px; color: #333;">Productos (${products.length})</h2>
                <div class="products-grid">
                    ${products.map(product => `
                        <div class="product-card">
                            <img src="${product.image}" alt="${product.title}" onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">
                            <h3>${product.title}</h3>
                            <div class="price">$${product.price}</div>
                            <span class="category">${product.category}</span>
                            <p style="color: #666; font-size: 12px; margin-top: 8px;">ID: ${product.id}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function getProductById() {
            const id = document.getElementById('getByIdInput').value;
            if (!id) {
                alert('Por favor ingresa un ID');
                return;
            }

            showLoading();
            try {
                const response = await fetch(`${API_URL}/${id}`);
                const data = await response.json();
                
                if (data.success) {
                    displayProducts([data.data]);
                }
                showResponse(data, !data.success);
            } catch (error) {
                showResponse({ error: error.message }, true);
            }
        }

        async function createProduct() {
            const product = {
                title: document.getElementById('createTitle').value,
                price: parseFloat(document.getElementById('createPrice').value),
                description: document.getElementById('createDescription').value,
                category: document.getElementById('createCategory').value,
                image: document.getElementById('createImage').value
            };

            if (!product.title || !product.price || !product.description || !product.category) {
                alert('Por favor completa todos los campos requeridos');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                const data = await response.json();
                showResponse(data, !data.success);
                
                if (data.success) {
                    document.getElementById('create').querySelectorAll('input, textarea').forEach(el => el.value = '');
                    setTimeout(() => getAllProducts(), 1000);
                }
            } catch (error) {
                showResponse({ error: error.message }, true);
            }
        }

        async function updateProduct() {
            const id = document.getElementById('updateId').value;
            const product = {
                title: document.getElementById('updateTitle').value,
                price: parseFloat(document.getElementById('updatePrice').value),
                description: document.getElementById('updateDescription').value,
                category: document.getElementById('updateCategory').value,
                image: document.getElementById('updateImage').value
            };

            if (!id || !product.title || !product.price || !product.description || !product.category) {
                alert('Por favor completa todos los campos');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                const data = await response.json();
                showResponse(data, !data.success);
                
                if (data.success) {
                    setTimeout(() => getAllProducts(), 1000);
                }
            } catch (error) {
                showResponse({ error: error.message }, true);
            }
        }

        async function patchProduct() {
            const id = document.getElementById('patchId').value;
            if (!id) {
                alert('Por favor ingresa un ID');
                return;
            }

            const product = {};
            const title = document.getElementById('patchTitle').value;
            const price = document.getElementById('patchPrice').value;
            const description = document.getElementById('patchDescription').value;
            const category = document.getElementById('patchCategory').value;

            if (title) product.title = title;
            if (price) product.price = parseFloat(price);
            if (description) product.description = description;
            if (category) product.category = category;

            if (Object.keys(product).length === 0) {
                alert('Por favor completa al menos un campo para actualizar');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                const data = await response.json();
                showResponse(data, !data.success);
                
                if (data.success) {
                    setTimeout(() => getAllProducts(), 1000);
                }
            } catch (error) {
                showResponse({ error: error.message }, true);
            }
        }

        async function deleteProduct() {
            const id = document.getElementById('deleteId').value;
            if (!id) {
                alert('Por favor ingresa un ID');
                return;
            }

            if (!confirm(`¿Estás seguro de eliminar el producto con ID ${id}?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                showResponse(data, !data.success);
                
                if (data.success) {
                    document.getElementById('deleteId').value = '';
                    setTimeout(() => getAllProducts(), 1000);
                }
            } catch (error) {
                showResponse({ error: error.message }, true);
            }
        }

        // Cargar productos al iniciar
        window.onload = () => {
            getAllProducts();
        };
    </script>
</body>
</html>
